<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="currentColor">
  <!-- Vertebrae as rounded rectangles/circles connected vertically -->
  <g>
    <!-- Top vertebra -->
    <circle cx="24" cy="8" r="2.5"/>
    <!-- Connection -->
    <line x1="24" y1="10.5" x2="24" y2="13" stroke="currentColor" stroke-width="1"/>
    
    <!-- Cervical vertebrae (3) -->
    <ellipse cx="24" cy="15" rx="3" ry="2.5"/>
    <line x1="24" y1="17.5" x2="24" y2="19.5" stroke="currentColor" stroke-width="1"/>
    
    <ellipse cx="24" cy="21" rx="3.2" ry="2.7"/>
    <line x1="24" y1="23.7" x2="24" y2="25.5" stroke="currentColor" stroke-width="1"/>
    
    <!-- Thoracic vertebrae (larger) -->
    <ellipse cx="24" cy="28" rx="3.5" ry="3"/>
    <line x1="24" y1="31" x2="24" y2="33" stroke="currentColor" stroke-width="1"/>
    
    <!-- Lumbar vertebrae (largest) -->
    <ellipse cx="24" cy="36" rx="4" ry="3.2"/>
    <line x1="24" y1="39.2" x2="24" y2="40.5" stroke="currentColor" stroke-width="1"/>
    
    <!-- Sacrum (triangular/trapezoidal) -->
    <path d="M20 42 L28 42 L27 46 L21 46 Z" fill="currentColor"/>
  </g>
</svg>
